# 感知引擎 · 提示词注册表
# 两个概念：片段(fragment) + 组合(recipe)
# 片段 = 一个命名文本单元（文件或动态生成）
# 组合 = 片段名的列表，按顺序拼接

fragments:
  # ── 文件片段 ──

  # Agent系统（L1-L4分层）
  - name: identity
    file: identity.md
  - name: constitution
    file: constitution.md
  - name: agent_framework
    file: agent_framework.md
  - name: agent_system
    file: agent_system.md
  - name: agent_default
    file: agent_default.md

  # 知识提取（L1/L2 已废弃，保留 screen 相关）
  - name: screen_l1_extract
    file: screen_l1_extract.md
  - name: screen_timeline_l1
    file: screen_timeline_l1.md

  # 对话索引层
  - name: conv_summary
    file: conv_summary.md
  - name: conv_segment
    file: conv_segment.md
  - name: conv_rolling
    file: conv_rolling.md
  - name: conv_synthesis
    file: conv_synthesis.md
  - name: conv_unified
    file: conv_unified.md

  # 实时提取+压缩
  - name: realtime_extract
    file: realtime_extract.md
  - name: compress
    file: compress.md

  # 屏幕管线
  - name: screen_timeline
    file: screen_timeline.md
  - name: screen_timeline_user
    file: screen_timeline_user.md
  - name: screen_observation
    file: screen_observation.md

  # 内容生成
  - name: daily_log_system
    file: daily_log_system.md
  - name: article_system
    file: article_system.md

  # 档案
  - name: profile_fill
    file: profile_fill.md

  # L2模块已废弃，片段已归档

  # 屏幕叙事（用户提示词模板）
  - name: screen_narrative_user
    file: screen_narrative_user.md

  # ── 动态片段 ──

  - name: sys_time
    dynamic: sys_time
  - name: sys_window
    dynamic: sys_window
  - name: sys_location
    dynamic: sys_location
  - name: sys_profile
    dynamic: sys_profile
  - name: sys_profile_identity_status
    dynamic: sys_profile_identity_status
  - name: sys_os
    dynamic: sys_os

recipes:
  # Agent创建：L1身份 + L2宪法 + L4框架 + 环境 + 档案
  - name: agent_create
    fragments:
      - identity
      - constitution
      - agent_framework
      - sys_time
      - sys_location
      - sys_window
      - sys_profile_identity_status

  # 屏幕L1视觉提取：提示词 + 时间 + 窗口
  - name: screen_l1
    fragments:
      - screen_l1_extract
      - sys_time
      - sys_window

  # 时间线索引(0.8B)：system=描述规则+时间+窗口，user=动态上下文
  - name: timeline_capture
    system_fragments:
      - screen_timeline
      - sys_time
      - sys_window
    user_fragments:
      - screen_timeline_user

  # 时间线→L1聚合：纯规则，无上下文注入
  - name: screen_timeline_l1
    fragments:
      - screen_timeline_l1

  # 对话L1提取已废弃
  # - name: conv_l1
  #   fragments:
  #     - l1_extract

  # 对话索引层提取（短对话一次到位 / 长对话最终综合）
  - name: conv_summary
    fragments:
      - conv_summary

  # 对话索引层提取（长对话段摘要）
  - name: conv_segment
    fragments:
      - conv_segment

  # 对话索引层提取（长对话滚动分割）
  - name: conv_rolling
    fragments:
      - conv_rolling

  # 对话索引层提取（长对话综合）
  - name: conv_synthesis
    fragments:
      - conv_synthesis

  # 对话索引层（统一滚动，短+长）
  - name: conv_unified
    fragments:
      - conv_unified

  # 实时5类型提取（BranchAgent用）
  - name: realtime_extract
    fragments:
      - realtime_extract

  # 对话压缩（话题边界切割后）
  - name: compress
    fragments:
      - compress

  # L2精炼已废弃
  # - name: l2_elevate
  #   fragments: [l2_base, l2_subject, l2_origin, l2_types, l2_redlines, l2_fields, l2_format]
  # - name: l2_elevate_tools
  #   fragments: [l2_base, l2_subject, l2_origin, l2_types, l2_redlines, l2_fields, l2_format_tools]

  # 每日日志：系统提示词 + 时间
  - name: daily_log
    fragments:
      - daily_log_system
      - sys_time

  # 文章生成：系统提示词 + 时间
  - name: article
    fragments:
      - article_system
      - sys_time

  # 档案填充：提示词 + 全部上下文
  - name: profile_fill
    fragments:
      - profile_fill
      - sys_time
      - sys_location
      - sys_window
      - sys_profile

  # Agent默认(无工具场景)
  - name: agent_default_create
    fragments:
      - agent_default
      - sys_time
      - sys_location
      - sys_window
      - sys_profile_identity_status

  # 屏幕叙事（system + user 分离）
  - name: screen_narrative
    system_fragments:
      - screen_narrative
      - sys_time
      - sys_window
      - sys_os
    user_fragments:
      - screen_narrative_user
